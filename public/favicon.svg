<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff9d2e" />
      <stop offset="50%" stop-color="#ff6a00" />
      <stop offset="100%" stop-color="#cc5600" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="100" height="100" fill="#050505" rx="22"/>
  <text x="50" y="70" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-style="italic" font-size="60" fill="url(#gradient)" text-anchor="middle" filter="url(#glow)">S</text>
</svg>
